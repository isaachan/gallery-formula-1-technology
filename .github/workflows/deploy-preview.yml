name: Deploy Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    # `secrets` is not permitted in a job-level `if` (causes a workflow parse
    # error), so expose the secret-presence check as a job-level env var and
    # gate the deploy steps with step-level `if` instead.
    env:
      HAS_VERCEL_SECRETS: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run ci

      - name: Install Vercel CLI
        if: ${{ env.HAS_VERCEL_SECRETS == 'true' }}
        run: npm install --global vercel@latest

      - name: Prepare Vercel metadata
        if: ${{ env.HAS_VERCEL_SECRETS == 'true' }}
        id: metadata
        run: |
          echo "app_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "content_version=$(git rev-parse HEAD:content)" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel preview environment
        if: ${{ env.HAS_VERCEL_SECRETS == 'true' }}
        run: vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build preview deployment
        if: ${{ env.HAS_VERCEL_SECRETS == 'true' }}
        run: vercel build --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          APP_VERSION: ${{ steps.metadata.outputs.app_version }}
          CONTENT_VERSION: ${{ steps.metadata.outputs.content_version }}
          GITHUB_SHA: ${{ github.sha }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        if: ${{ env.HAS_VERCEL_SECRETS == 'true' }}
        id: deploy
        run: |
          preview_url=$(vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL
        if: ${{ env.HAS_VERCEL_SECRETS == 'true' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- vercel-preview-comment -->';
            const body = `${marker}
            Preview deployment is ready: ${process.env.PREVIEW_URL}

            Diagnostics endpoint: ${process.env.PREVIEW_URL}/api/diagnostics`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
