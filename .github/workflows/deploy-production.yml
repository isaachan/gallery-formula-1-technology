name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Prepare Vercel metadata
        id: metadata
        run: |
          echo "app_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "content_version=$(git rev-parse HEAD:content)" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build production deployment
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          APP_VERSION: ${{ steps.metadata.outputs.app_version }}
          CONTENT_VERSION: ${{ steps.metadata.outputs.content_version }}
          GITHUB_SHA: ${{ github.sha }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
